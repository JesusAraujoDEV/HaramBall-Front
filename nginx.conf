server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache the hashed static assets.
  location /_expo/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: expo-router (web output "single") serves every client route
  # from index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
